<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <header class="site-header">
    <a href="index.html" class="logo">HENRY LUX PHOTOGRAPHY</a>

    <nav class="site-nav" id="site-nav">
      <a href="index.html">Home</a>
      <a href="portraits.html">Portraits</a>
      <a href="still-life.html" class="current-page" aria-current="page">Still Life</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>

    <button
      type="button"
      class="menu-toggle"
      id="menu-toggle"
      aria-label="Toggle navigation"
      aria-controls="site-nav"
      aria-expanded="false"
    >
      Menu
    </button>
  </header>

  <main id="main-content">

    <section class="page-intro">
      <p class="eyebrow">Portfolio</p>
      <h1>Still Life</h1>
      <p>
        Still life and product studies shaped by light, form, and surface.
      </p>
    </section>

    <section class="gallery">

      <a class="reveal" href="images/still-life/large/still-life-01-eggs-whisk.jpg">
        <img
          src="images/still-life/thumb/still-life-thumb-01-eggs-whisk.jpg"
          alt="Still life photograph of eggs against a light background"
        >
      </a>

      <a class="reveal" href="images/still-life/large/still-life-02-breadfruit-knife.jpg">
        <img
          src="images/still-life/thumb/still-life-thumb-02-breadfruit-knife.jpg"
          alt="Still life photograph of breadfruit with a knife"
        >
      </a>

      <a class="reveal" href="images/still-life/large/still-life-03-eggs-measuring-cup-whisk.jpg">
        <img
          src="images/still-life/thumb/still-life-thumb-03-eggs-measuring-cup-whisk.jpg"
          alt="Still life photograph of eggs and a measuring cup"
        >
      </a>
      
      <a class="reveal" href="images/still-life/large/still-life-04-grater-whisks.jpg">
        <img
          src="images/still-life/thumb/still-life-thumb-04-grater-whisks.jpg"
          alt="Still life photograph of kitchen tools including a grater and whisks"
          loading="lazy"
          decoding="async"
        >
      </a>

      <a class="reveal" href="images/still-life/large/still-life-05-orange-glass-shadow.jpg">
        <img
          src="images/still-life/thumb/still-life-thumb-05-orange-glass-shadow.jpg"
          alt="Still life photograph of orange glass with a cast shadow"
          loading="lazy"
          decoding="async"
        >
      </a>

      <a class="reveal" href="images/still-life/large/still-life-06-chocolate-orange-pan.jpg">
        <img
          src="images/still-life/thumb/still-life-thumb-06-chocolate-orange-pan.jpg"
          alt="Still life photograph of chocolate and orange in a pan"
          loading="lazy"
          decoding="async"
        >
      </a>

      <a class="reveal" href="images/still-life/large/still-life-07-blue-bowl-fruit.jpg">
        <img
          src="images/still-life/thumb/still-life-thumb-07-blue-bowl-fruit.jpg"
          alt="Still life photograph of fruit in a blue bowl"
          loading="lazy"
          decoding="async"
        >
      </a>

      <a class="reveal" href="images/still-life/large/still-life-08-strawberries-kisses.jpg">
        <img
          src="images/still-life/thumb/still-life-thumb-08-strawberries-kisses.jpg"
          alt="Still life photograph of strawberries and wrapped chocolate"
          loading="lazy"
         decoding="async"
        >
      </a>
      
    </section>

  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Henry Downes / Henry Lux. All images and content reserved. — 
      <a href="https://instagram.com/hluxphotography" target="_blank" rel="noopener noreferrer">Instagram</a>
    </p>
  </footer>

  <!-- Lightbox Modal Box -->

  <div id="lightbox" class="lightbox">

    <button type="button" class="lightbox-close" aria-label="Close image">&times;</button>

    <button type="button" class="lightbox-zoom" id="lightbox-zoom" aria-label="Expand image" aria-pressed="false">+</button>

    <button type="button" class="lightbox-nav lightbox-prev" aria-label="Previous image">&#10094;</button>

    <img class="lightbox-content" id="lightbox-img" alt="">

    <button type="button" class="lightbox-nav lightbox-next" aria-label="Next image">&#10095;</button>

  </div>

  <script src="js/main.js"></script>
